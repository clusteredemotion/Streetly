name: Build Streetly Admin APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/admin-app/**"
      - ".github/workflows/admin-apk.yml"
  workflow_dispatch: {}

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/admin-app
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build web app
        env:
          PORT: "5174"
          NODE_ENV: "production"
        run: pnpm run build

      - name: Sync Capacitor assets into Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: artifacts/admin-app/android
        run: ./gradlew assembleDebug --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: streetly-admin-debug-apk
          path: artifacts/admin-app/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

  build-release-apk:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' }}
    defaults:
      run:
        working-directory: artifacts/admin-app
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build web app
        env:
          PORT: "5174"
          NODE_ENV: "production"
        run: pnpm run build

      - name: Sync Capacitor assets into Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Decode release keystore
        env:
          STREETLY_KEYSTORE_BASE64: ${{ secrets.STREETLY_KEYSTORE_BASE64 }}
        run: |
          mkdir -p android/keystore
          echo "$STREETLY_KEYSTORE_BASE64" | base64 -d > android/keystore/streetly-release.keystore

      - name: Build signed release APK
        working-directory: artifacts/admin-app/android
        env:
          STREETLY_KEYSTORE_PATH: keystore/streetly-release.keystore
          STREETLY_KEYSTORE_PASSWORD: ${{ secrets.STREETLY_KEYSTORE_PASSWORD }}
          STREETLY_KEY_ALIAS: ${{ secrets.STREETLY_KEY_ALIAS }}
          STREETLY_KEY_PASSWORD: ${{ secrets.STREETLY_KEYSTORE_PASSWORD }}
        run: ./gradlew assembleRelease --console=plain

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: streetly-admin-release-apk
          path: artifacts/admin-app/android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
