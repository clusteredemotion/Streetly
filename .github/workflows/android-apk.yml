name: Build Streetly Android APK

on:
  push:
    branches: [main]
    paths:
      - "artifacts/streetly/**"
      - ".github/workflows/android-apk.yml"
  workflow_dispatch: {}

jobs:
  build-apk:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/streetly
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: Build web app
        env:
          PORT: "5999"
          BASE_PATH: "/"
          NODE_ENV: "production"
        run: pnpm run build

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      - name: Build debug APK
        working-directory: artifacts/streetly/android
        run: ./gradlew assembleDebug --console=plain

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: streetly-debug-apk
          path: artifacts/streetly/android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
