name: E2E Rider Redirect Check

on:
  push:
  workflow_dispatch: {}

jobs:
  e2e-rider-redirect:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: streetly
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/streetly?sslmode=disable

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Push database schema
        # Fresh CI database, so there is nothing to disambiguate, but pipe
        # "yes" as a safety net in case drizzle-kit still asks to confirm
        # a create/rename (it requires a TTY otherwise and would hang CI).
        run: yes | pnpm --filter @workspace/db run push-force

      - name: Install Playwright browsers
        working-directory: artifacts/streetly
        run: npx playwright install --with-deps chromium

      - name: Build web app
        working-directory: artifacts/streetly
        env:
          PORT: "19254"
          BASE_PATH: "/"
          NODE_ENV: "production"
        run: pnpm run build

      - name: Build api-server
        working-directory: artifacts/api-server
        run: pnpm run build

      - name: Start api-server
        working-directory: artifacts/api-server
        env:
          PORT: "8080"
          NODE_ENV: "production"
        run: |
          nohup node --enable-source-maps ./dist/index.mjs > /tmp/api-server.log 2>&1 &
          echo $! > /tmp/api-server.pid

      - name: Start web preview server
        working-directory: artifacts/streetly
        env:
          PORT: "19254"
          BASE_PATH: "/"
        run: |
          nohup npx vite preview --config vite.config.ts --host 0.0.0.0 > /tmp/web.log 2>&1 &
          echo $! > /tmp/web.pid

      - name: Start CI proxy (combines web + api under one origin)
        env:
          PROXY_PORT: "5000"
          WEB_PORT: "19254"
          API_PORT: "8080"
        run: |
          nohup node artifacts/streetly/e2e/ci-proxy.mjs > /tmp/proxy.log 2>&1 &
          echo $! > /tmp/proxy.pid

      - name: Wait for app to be ready
        run: npx wait-on -t 60000 http://localhost:5000/auth/login

      - name: Run rider-redirect e2e check
        working-directory: artifacts/streetly
        run: npx playwright test e2e/rider-redirect.spec.ts

      - name: Show service logs on failure
        if: failure()
        run: |
          echo "--- api-server log ---"; cat /tmp/api-server.log || true
          echo "--- web log ---"; cat /tmp/web.log || true
          echo "--- proxy log ---"; cat /tmp/proxy.log || true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: artifacts/streetly/playwright-report
          if-no-files-found: ignore
