openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Streetly API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: businesses
    description: Business listings
  - name: categories
    description: Business categories
  - name: locations
    description: Cities, areas, streets
  - name: reviews
    description: Business reviews
  - name: agents
    description: Field agent system
  - name: admin
    description: Admin operations
  - name: stats
    description: Platform statistics
  - name: contact
    description: Contact form submissions

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Stats (wow endpoint)
  /stats:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # Geo / IP location
  /geo/info:
    get:
      operationId: getGeoInfo
      tags: [geo]
      summary: Get the visitor's IP address, IP-based location, and NGN currency conversion rate
      responses:
        "200":
          description: Visitor geo/currency info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoInfo"

  # Contact
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all business categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # Cities
  /cities:
    get:
      operationId: listCities
      tags: [locations]
      summary: List all cities
      responses:
        "200":
          description: Cities list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /cities/{cityId}/areas:
    get:
      operationId: listAreas
      tags: [locations]
      summary: List areas in a city
      parameters:
        - name: cityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Areas list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Area"

  /areas/{areaId}/streets:
    get:
      operationId: listStreets
      tags: [locations]
      summary: List streets in an area
      parameters:
        - name: areaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Streets list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Street"

  /streets/{streetId}/businesses:
    get:
      operationId: getStreetBusinesses
      tags: [locations]
      summary: Get all businesses on a street (Street Explorer)
      parameters:
        - name: streetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Businesses on this street
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  # Businesses
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List and search businesses
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: cityId
          in: query
          schema:
            type: integer
        - name: areaId
          in: query
          schema:
            type: integer
        - name: streetId
          in: query
          schema:
            type: integer
        - name: verified
          in: query
          schema:
            type: boolean
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Businesses list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessList"
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/featured:
    get:
      operationId: getFeaturedBusinesses
      tags: [businesses]
      summary: Get featured businesses (premium/verified)
      responses:
        "200":
          description: Featured businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdate"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Delete a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reviews
  /businesses/{businessId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # Field Agent
  /agents/apply:
    post:
      operationId: applyAsAgent
      tags: [agents]
      summary: Apply to become a field agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{agentId}/dashboard:
    get:
      operationId: getAgentDashboard
      tags: [agents]
      summary: Get agent dashboard stats
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDashboard"

  /agents/{agentId}/listings:
    get:
      operationId: getAgentListings
      tags: [agents]
      summary: Get businesses submitted by agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /agents/{agentId}/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [agents]
      summary: Request earnings withdrawal
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /agents/leaderboard:
    get:
      operationId: getAgentLeaderboard
      tags: [agents]
      summary: Get top agents leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLeaderboardEntry"

  # Admin
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin platform statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/businesses/pending:
    get:
      operationId: getPendingBusinesses
      tags: [admin]
      summary: Get businesses pending approval
      responses:
        "200":
          description: Pending businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /admin/businesses/{id}/approve:
    patch:
      operationId: approveBusiness
      tags: [admin]
      summary: Approve or reject a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /admin/agents/pending:
    get:
      operationId: getPendingAgents
      tags: [admin]
      summary: Get agents pending approval
      responses:
        "200":
          description: Pending agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /admin/agents/{id}/approve:
    patch:
      operationId: approveAgent
      tags: [admin]
      summary: Approve or reject an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [visitor, business_owner, field_agent]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    # Contact
    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string

    ContactSubmission:
      type: object
      required: [id, name, email, subject, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string

    # Stats
    PlatformStats:
      type: object
      required: [totalBusinesses, totalStreets, totalCities, totalAgents]
      properties:
        totalBusinesses:
          type: integer
        totalStreets:
          type: integer
        totalCities:
          type: integer
        totalAgents:
          type: integer
        verifiedBusinesses:
          type: integer
        totalEarningsPaid:
          type: number

    GeoInfo:
      type: object
      required: [ip, currencyCode]
      properties:
        ip:
          type: string
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        countryCode:
          type: string
          nullable: true
        currencyCode:
          type: string
        ngnToLocalRate:
          type: number
          nullable: true

    AdminStats:
      type: object
      required: [totalBusinesses, totalAgents, totalUsers, pendingBusinesses, pendingAgents]
      properties:
        totalBusinesses:
          type: integer
        totalAgents:
          type: integer
        totalUsers:
          type: integer
        pendingBusinesses:
          type: integer
        pendingAgents:
          type: integer
        revenue:
          type: number

    # Categories
    Category:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        businessCount:
          type: integer

    # Locations
    City:
      type: object
      required: [id, name, state, country]
      properties:
        id:
          type: integer
        name:
          type: string
        state:
          type: string
        country:
          type: string
        businessCount:
          type: integer

    Area:
      type: object
      required: [id, name, cityId]
      properties:
        id:
          type: integer
        name:
          type: string
        cityId:
          type: integer
        businessCount:
          type: integer

    Street:
      type: object
      required: [id, name, areaId]
      properties:
        id:
          type: integer
        name:
          type: string
        areaId:
          type: integer
        businessCount:
          type: integer

    # Business
    BusinessPhoto:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
        url:
          type: string
        caption:
          type: ["string", "null"]

    Business:
      type: object
      required: [id, name, categoryId, streetId, status, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: ["string", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        streetId:
          type: integer
        streetName:
          type: ["string", "null"]
        areaName:
          type: ["string", "null"]
        cityName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        openingHours:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        verified:
          type: boolean
        featured:
          type: boolean
        plan:
          type: string
          enum: [free, premium]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        photos:
          type: array
          items:
            $ref: "#/components/schemas/BusinessPhoto"
        ownerId:
          type: ["integer", "null"]
        agentId:
          type: ["integer", "null"]
        createdAt:
          type: string

    BusinessList:
      type: object
      required: [businesses, total]
      properties:
        businesses:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        total:
          type: integer

    BusinessInput:
      type: object
      required: [name, categoryId, streetId]
      properties:
        name:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        streetId:
          type: integer
        address:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        website:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        openingHours:
          type: string

    BusinessUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        streetId:
          type: integer
        address:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        website:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        openingHours:
          type: string

    # Reviews
    Review:
      type: object
      required: [id, businessId, rating, createdAt]
      properties:
        id:
          type: integer
        businessId:
          type: integer
        userId:
          type: ["integer", "null"]
        reviewerName:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [rating]
      properties:
        reviewerName:
          type: string
        rating:
          type: integer
        comment:
          type: string

    # Agents
    Agent:
      type: object
      required: [id, userId, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        totalListings:
          type: integer
        approvedListings:
          type: integer
        totalEarnings:
          type: number
        availableBalance:
          type: number
        bankName:
          type: ["string", "null"]
        accountNumber:
          type: ["string", "null"]
        accountName:
          type: ["string", "null"]
        createdAt:
          type: string

    AgentApplicationInput:
      type: object
      required: [bankName, accountNumber, accountName]
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        idType:
          type: string
        idNumber:
          type: string

    AgentDashboard:
      type: object
      required: [agent, recentListings]
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        recentListings:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        recentWithdrawals:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"

    Withdrawal:
      type: object
      required: [id, agentId, amount, status, createdAt]
      properties:
        id:
          type: integer
        agentId:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdAt:
          type: string

    WithdrawalInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    AgentLeaderboardEntry:
      type: object
      required: [rank, agentId, userName, approvedListings, totalEarnings]
      properties:
        rank:
          type: integer
        agentId:
          type: integer
        userName:
          type: string
        approvedListings:
          type: integer
        totalEarnings:
          type: number

    # Admin
    ApprovalInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        reason:
          type: string
