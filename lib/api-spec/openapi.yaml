openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Streetly API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: businesses
    description: Business listings
  - name: categories
    description: Business categories
  - name: locations
    description: Cities, areas, streets
  - name: reviews
    description: Business reviews
  - name: agents
    description: Field agent system
  - name: riders
    description: Delivery rider system
  - name: deliveries
    description: Delivery order tracking
  - name: admin
    description: Admin operations
  - name: stats
    description: Platform statistics
  - name: contact
    description: Contact form submissions
  - name: support
    description: Support ticket system
  - name: Storage
    description: Object storage upload and serving endpoints.

paths:
  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # Auth
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/google:
    post:
      operationId: googleAuth
      tags: [auth]
      summary: Sign up or log in with Google
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoogleAuthInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/change-password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Change the current user's password (also clears the must-change-password flag)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
          content:
            application/json:
              schema:
                type: object
                required: [success]
                properties:
                  success:
                    type: boolean

  /auth/setup-password:
    post:
      operationId: setupPassword
      tags: [auth]
      summary: Consume a one-time password-setup link (from the welcome email) to set an initial password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetupPasswordInput"
      responses:
        "200":
          description: Password set
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # Stats (wow endpoint)
  /stats:
    get:
      operationId: getPlatformStats
      tags: [stats]
      summary: Get platform-wide statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

  # Geo / IP location
  /geo/info:
    get:
      operationId: getGeoInfo
      tags: [geo]
      summary: Get the visitor's IP address, IP-based location, and NGN currency conversion rate
      responses:
        "200":
          description: Visitor geo/currency info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GeoInfo"

  # Contact
  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact form message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContactInput"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactSubmission"

  # Support Tickets
  /support-tickets:
    get:
      operationId: listMySupportTickets
      tags: [support]
      summary: List the logged-in user's support tickets
      responses:
        "200":
          description: List of tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SupportTicket"
    post:
      operationId: createSupportTicket
      tags: [support]
      summary: Create a new support ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /support-tickets/{id}:
    get:
      operationId: getSupportTicket
      tags: [support]
      summary: Get a support ticket with its replies
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Ticket with replies
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketDetail"

  /support-tickets/{id}/replies:
    post:
      operationId: replySupportTicket
      tags: [support]
      summary: Reply to a support ticket
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSupportTicketReplyInput"
      responses:
        "201":
          description: Reply created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicketReply"

  /support-tickets/{id}/status:
    put:
      operationId: updateSupportTicketStatus
      tags: [support]
      summary: Update a support ticket's status (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSupportTicketStatusInput"
      responses:
        "200":
          description: Updated ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SupportTicket"

  /admin/support-tickets:
    get:
      operationId: listAllSupportTickets
      tags: [admin, support]
      summary: List all support tickets (admin only)
      responses:
        "200":
          description: List of all tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminSupportTicket"

  # Categories
  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List all business categories
      responses:
        "200":
          description: Categories list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Category"

  # Cities
  /cities:
    get:
      operationId: listCities
      tags: [locations]
      summary: List all cities
      responses:
        "200":
          description: Cities list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/City"

  /cities/{cityId}/areas:
    get:
      operationId: listAreas
      tags: [locations]
      summary: List areas in a city
      parameters:
        - name: cityId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Areas list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Area"

  /areas/{areaId}/streets:
    get:
      operationId: listStreets
      tags: [locations]
      summary: List streets in an area
      parameters:
        - name: areaId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Streets list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Street"

  /streets/{streetId}/businesses:
    get:
      operationId: getStreetBusinesses
      tags: [locations]
      summary: Get all businesses on a street (Street Explorer)
      parameters:
        - name: streetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Businesses on this street
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  # Businesses
  /businesses:
    get:
      operationId: listBusinesses
      tags: [businesses]
      summary: List and search businesses
      parameters:
        - name: q
          in: query
          schema:
            type: string
        - name: categoryId
          in: query
          schema:
            type: integer
        - name: cityId
          in: query
          schema:
            type: integer
        - name: areaId
          in: query
          schema:
            type: integer
        - name: streetId
          in: query
          schema:
            type: integer
        - name: verified
          in: query
          schema:
            type: boolean
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
        - name: offset
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: Businesses list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BusinessList"
    post:
      operationId: createBusiness
      tags: [businesses]
      summary: Create a new business listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /businesses/mine:
    get:
      operationId: listMyBusinesses
      tags: [businesses]
      summary: List businesses owned by the current authenticated user (any status)
      responses:
        "200":
          description: The current user's businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /businesses/featured:
    get:
      operationId: getFeaturedBusinesses
      tags: [businesses]
      summary: Get featured businesses (premium/verified)
      responses:
        "200":
          description: Featured businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /businesses/{id}:
    get:
      operationId: getBusiness
      tags: [businesses]
      summary: Get a business by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
        "404":
          description: Not found
    patch:
      operationId: updateBusiness
      tags: [businesses]
      summary: Update a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BusinessUpdate"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"
    delete:
      operationId: deleteBusiness
      tags: [businesses]
      summary: Delete a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # Reviews
  /businesses/{businessId}/reviews:
    get:
      operationId: listReviews
      tags: [reviews]
      summary: List reviews for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reviews list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Review"
    post:
      operationId: createReview
      tags: [reviews]
      summary: Create a review
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewInput"
      responses:
        "201":
          description: Created review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Review"

  # Field Agent
  /agents/apply:
    post:
      operationId: applyAsAgent
      tags: [agents]
      summary: Apply to become a field agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

  /agents/{agentId}/dashboard:
    get:
      operationId: getAgentDashboard
      tags: [agents]
      summary: Get agent dashboard stats
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent dashboard
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentDashboard"

  /agents/{agentId}/listings:
    get:
      operationId: getAgentListings
      tags: [agents]
      summary: Get businesses submitted by agent
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent listings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /agents/{agentId}/withdraw:
    post:
      operationId: requestWithdrawal
      tags: [agents]
      summary: Request earnings withdrawal
      parameters:
        - name: agentId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawalInput"
      responses:
        "201":
          description: Withdrawal requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Withdrawal"

  /agents/leaderboard:
    get:
      operationId: getAgentLeaderboard
      tags: [agents]
      summary: Get top agents leaderboard
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AgentLeaderboardEntry"

  # Riders
  /riders/by-user:
    get:
      operationId: getMyRiderProfile
      tags: [riders]
      summary: Get rider profile for the current user
      responses:
        "200":
          description: Rider profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/apply:
    post:
      operationId: applyAsRider
      tags: [riders]
      summary: Apply to become a delivery rider
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderApplicationInput"
      responses:
        "201":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{riderId}/status:
    patch:
      operationId: setRiderOnlineStatus
      tags: [riders]
      summary: Go online or offline
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderOnlineStatusInput"
      responses:
        "200":
          description: Updated rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/{riderId}/location:
    post:
      operationId: updateRiderLocation
      tags: [riders]
      summary: Push a live GPS location update
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RiderLocationInput"
      responses:
        "200":
          description: Updated rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /riders/nearby:
    get:
      operationId: getNearbyRiders
      tags: [riders]
      summary: Get online riders near a point
      parameters:
        - name: lat
          in: query
          required: true
          schema:
            type: number
        - name: lon
          in: query
          required: true
          schema:
            type: number
        - name: radiusKm
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Nearby riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NearbyRider"

  /riders/available:
    get:
      operationId: getAvailableRidersDirectory
      tags: [riders]
      summary: List all currently online/approved riders for the public rider directory
      parameters:
        - name: lat
          in: query
          required: false
          schema:
            type: number
        - name: lon
          in: query
          required: false
          schema:
            type: number
      responses:
        "200":
          description: Available riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RiderDirectoryEntry"

  /riders/{riderId}/orders:
    get:
      operationId: getRiderOrders
      tags: [riders]
      summary: Get a rider's active order and available nearby requests
      parameters:
        - name: riderId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Rider order queue
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RiderOrderQueue"

  # Deliveries
  /businesses/{businessId}/deliveries:
    post:
      operationId: createDeliveryOrder
      tags: [deliveries]
      summary: Request a delivery/pickup from a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryOrderInput"
      responses:
        "201":
          description: Delivery order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"
    get:
      operationId: listBusinessDeliveries
      tags: [deliveries]
      summary: List delivery orders for a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery orders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeliveryOrder"

  /deliveries/{id}:
    get:
      operationId: getDeliveryOrder
      tags: [deliveries]
      summary: Get a delivery order (for live tracking)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Delivery order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

  /deliveries/{id}/accept:
    post:
      operationId: acceptDeliveryOrder
      tags: [deliveries]
      summary: Rider accepts a delivery order
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Updated delivery order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

  /deliveries/{id}/status:
    patch:
      operationId: updateDeliveryStatus
      tags: [deliveries]
      summary: Rider updates delivery order status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeliveryStatusInput"
      responses:
        "200":
          description: Updated delivery order
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

  /businesses/{businessId}/marketplace-items:
    get:
      operationId: listMarketplaceItems
      tags: [marketplace]
      summary: List available marketplace items for a business (public storefront view)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marketplace items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"
    post:
      operationId: createMarketplaceItem
      tags: [marketplace]
      summary: Owner/admin adds a marketplace item to a business
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceItemInput"
      responses:
        "201":
          description: Item created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"

  /businesses/{businessId}/marketplace-items/manage:
    get:
      operationId: listMarketplaceItemsForManagement
      tags: [marketplace]
      summary: List all marketplace items for a business (owner/admin view, includes unavailable items)
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Marketplace items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/MarketplaceItem"

  /marketplace-items/{id}:
    patch:
      operationId: updateMarketplaceItem
      tags: [marketplace]
      summary: Owner/admin updates a marketplace item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceItemUpdateInput"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceItem"
    delete:
      operationId: deleteMarketplaceItem
      tags: [marketplace]
      summary: Owner/admin deletes a marketplace item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Item deleted

  /businesses/{businessId}/available-riders:
    get:
      operationId: getAvailableRiders
      tags: [marketplace]
      summary: List online riders near a business with a computed delivery fee, for checkout rider selection
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Available riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AvailableRider"

  /businesses/{businessId}/marketplace-orders:
    post:
      operationId: createMarketplaceOrder
      tags: [marketplace]
      summary: Checkout a cart of marketplace items with a chosen rider
      parameters:
        - name: businessId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MarketplaceOrderInput"
      responses:
        "201":
          description: Marketplace order created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeliveryOrder"

  # Admin
  /admin/riders/pending:
    get:
      operationId: getPendingRiders
      tags: [admin]
      summary: Get riders pending approval
      responses:
        "200":
          description: Pending riders
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Rider"

  /admin/riders/{id}/approve:
    patch:
      operationId: approveRider
      tags: [admin]
      summary: Approve or reject a rider
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Updated rider
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rider"

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin platform statistics
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/businesses/pending:
    get:
      operationId: getPendingBusinesses
      tags: [admin]
      summary: Get businesses pending approval
      responses:
        "200":
          description: Pending businesses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Business"

  /admin/businesses/{id}/approve:
    patch:
      operationId: approveBusiness
      tags: [admin]
      summary: Approve or reject a business
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Updated business
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Business"

  /admin/agents/pending:
    get:
      operationId: getPendingAgents
      tags: [admin]
      summary: Get agents pending approval
      responses:
        "200":
          description: Pending agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"

  /admin/agents/{id}/approve:
    patch:
      operationId: approveAgent
      tags: [admin]
      summary: Approve or reject an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # Auth
    RegisterInput:
      type: object
      required: [name, email, password, role, recaptchaToken]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          enum: [visitor, business_owner, field_agent]
        recaptchaToken:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    GoogleAuthInput:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        role:
          type: string
          enum: [visitor, business_owner, field_agent]
        referralCode:
          type: string
          nullable: true

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    SetupPasswordInput:
      type: object
      required: [token, newPassword]
      properties:
        token:
          type: string
        newPassword:
          type: string

    # Contact
    ContactInput:
      type: object
      required: [name, email, subject, message]
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string

    ContactSubmission:
      type: object
      required: [id, name, email, subject, message, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string

    # Support Tickets
    SupportTicket:
      type: object
      required: [id, userId, subject, message, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        subject:
          type: string
        message:
          type: string
        status:
          type: string
          enum: [open, in_progress, resolved, closed]
        createdAt:
          type: string
        updatedAt:
          type: string

    AdminSupportTicket:
      allOf:
        - $ref: "#/components/schemas/SupportTicket"
        - type: object
          properties:
            userName:
              type: string
              nullable: true
            userEmail:
              type: string
              nullable: true
            userRole:
              type: string
              nullable: true

    SupportTicketReply:
      type: object
      required: [id, ticketId, senderId, senderRole, message, createdAt]
      properties:
        id:
          type: integer
        ticketId:
          type: integer
        senderId:
          type: integer
        senderRole:
          type: string
          enum: [user, admin]
        message:
          type: string
        createdAt:
          type: string
        senderName:
          type: string
          nullable: true

    SupportTicketDetail:
      type: object
      required: [ticket, replies]
      properties:
        ticket:
          $ref: "#/components/schemas/SupportTicket"
        replies:
          type: array
          items:
            $ref: "#/components/schemas/SupportTicketReply"

    CreateSupportTicketInput:
      type: object
      required: [subject, message]
      properties:
        subject:
          type: string
        message:
          type: string

    CreateSupportTicketReplyInput:
      type: object
      required: [message]
      properties:
        message:
          type: string

    UpdateSupportTicketStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [open, in_progress, resolved, closed]

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, name, email, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        createdAt:
          type: string
        mustChangePassword:
          type: boolean

    # Stats
    PlatformStats:
      type: object
      required: [totalBusinesses, totalStreets, totalCities, totalAgents]
      properties:
        totalBusinesses:
          type: integer
        totalStreets:
          type: integer
        totalCities:
          type: integer
        totalAgents:
          type: integer
        verifiedBusinesses:
          type: integer
        totalEarningsPaid:
          type: number

    GeoInfo:
      type: object
      required: [ip, currencyCode]
      properties:
        ip:
          type: string
        city:
          type: string
          nullable: true
        region:
          type: string
          nullable: true
        country:
          type: string
          nullable: true
        countryCode:
          type: string
          nullable: true
        currencyCode:
          type: string
        ngnToLocalRate:
          type: number
          nullable: true

    AdminStats:
      type: object
      required: [totalBusinesses, totalAgents, totalUsers, pendingBusinesses, pendingAgents]
      properties:
        totalBusinesses:
          type: integer
        totalAgents:
          type: integer
        totalUsers:
          type: integer
        pendingBusinesses:
          type: integer
        pendingAgents:
          type: integer
        revenue:
          type: number

    # Categories
    Category:
      type: object
      required: [id, name, icon]
      properties:
        id:
          type: integer
        name:
          type: string
        icon:
          type: string
        businessCount:
          type: integer

    # Locations
    City:
      type: object
      required: [id, name, state, country]
      properties:
        id:
          type: integer
        name:
          type: string
        state:
          type: string
        country:
          type: string
        businessCount:
          type: integer

    Area:
      type: object
      required: [id, name, cityId]
      properties:
        id:
          type: integer
        name:
          type: string
        cityId:
          type: integer
        businessCount:
          type: integer

    Street:
      type: object
      required: [id, name, areaId]
      properties:
        id:
          type: integer
        name:
          type: string
        areaId:
          type: integer
        businessCount:
          type: integer

    # Business
    BusinessPhoto:
      type: object
      required: [id, url]
      properties:
        id:
          type: integer
        url:
          type: string
        caption:
          type: ["string", "null"]

    Business:
      type: object
      required: [id, name, categoryId, streetId, status, createdAt]
      properties:
        id:
          type: integer
        slug:
          type: ["string", "null"]
        name:
          type: string
        description:
          type: ["string", "null"]
        categoryId:
          type: integer
        categoryName:
          type: ["string", "null"]
        streetId:
          type: integer
        streetName:
          type: ["string", "null"]
        areaName:
          type: ["string", "null"]
        cityName:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        website:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        openingHours:
          type: ["string", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        verified:
          type: boolean
        featured:
          type: boolean
        plan:
          type: string
          enum: [free, premium]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        photos:
          type: array
          items:
            $ref: "#/components/schemas/BusinessPhoto"
        ownerId:
          type: ["integer", "null"]
        agentId:
          type: ["integer", "null"]
        createdAt:
          type: string

    BusinessList:
      type: object
      required: [businesses, total]
      properties:
        businesses:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        total:
          type: integer

    BusinessInput:
      type: object
      required: [name, categoryId, streetId]
      properties:
        name:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        streetId:
          type: integer
        address:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        website:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        openingHours:
          type: string

    BusinessUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        categoryId:
          type: integer
        streetId:
          type: integer
        address:
          type: string
        phone:
          type: string
        whatsapp:
          type: string
        website:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        openingHours:
          type: string

    # Reviews
    Review:
      type: object
      required: [id, businessId, rating, createdAt]
      properties:
        id:
          type: integer
        businessId:
          type: integer
        userId:
          type: ["integer", "null"]
        reviewerName:
          type: string
        rating:
          type: integer
        comment:
          type: ["string", "null"]
        createdAt:
          type: string

    ReviewInput:
      type: object
      required: [rating]
      properties:
        reviewerName:
          type: string
        rating:
          type: integer
        comment:
          type: string

    # Agents
    Agent:
      type: object
      required: [id, userId, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        totalListings:
          type: integer
        approvedListings:
          type: integer
        totalEarnings:
          type: number
        availableBalance:
          type: number
        bankName:
          type: ["string", "null"]
        accountNumber:
          type: ["string", "null"]
        accountName:
          type: ["string", "null"]
        createdAt:
          type: string

    AgentApplicationInput:
      type: object
      required: [bankName, accountNumber, accountName]
      properties:
        bankName:
          type: string
        accountNumber:
          type: string
        accountName:
          type: string
        idType:
          type: string
        idNumber:
          type: string

    AgentDashboard:
      type: object
      required: [agent, recentListings]
      properties:
        agent:
          $ref: "#/components/schemas/Agent"
        recentListings:
          type: array
          items:
            $ref: "#/components/schemas/Business"
        recentWithdrawals:
          type: array
          items:
            $ref: "#/components/schemas/Withdrawal"

    Withdrawal:
      type: object
      required: [id, agentId, amount, status, createdAt]
      properties:
        id:
          type: integer
        agentId:
          type: integer
        amount:
          type: number
        status:
          type: string
          enum: [pending, processing, completed, failed]
        createdAt:
          type: string

    WithdrawalInput:
      type: object
      required: [amount]
      properties:
        amount:
          type: number

    AgentLeaderboardEntry:
      type: object
      required: [rank, agentId, userName, approvedListings, totalEarnings]
      properties:
        rank:
          type: integer
        agentId:
          type: integer
        userName:
          type: string
        approvedListings:
          type: integer
        totalEarnings:
          type: number

    # Riders
    Rider:
      type: object
      required: [id, userId, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        userName:
          type: string
        userEmail:
          type: string
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        fullName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
        idType:
          type: ["string", "null"]
        idNumber:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        passportObjectPath:
          type: ["string", "null"]
        ninSlipObjectPath:
          type: ["string", "null"]
        isOnline:
          type: boolean
        currentLatitude:
          type: ["number", "null"]
        currentLongitude:
          type: ["number", "null"]
        lastLocationAt:
          type: ["string", "null"]
        totalDeliveries:
          type: integer
        createdAt:
          type: string

    RiderOnlineStatusInput:
      type: object
      required: [isOnline]
      properties:
        isOnline:
          type: boolean

    RiderLocationInput:
      type: object
      required: [latitude, longitude]
      properties:
        latitude:
          type: number
        longitude:
          type: number

    RiderApplicationInput:
      type: object
      required: [fullName, phone, vehicleType, dateOfBirth, address, passportObjectPath, ninSlipObjectPath]
      properties:
        fullName:
          type: string
        phone:
          type: string
        vehicleType:
          type: string
        idType:
          type: string
        idNumber:
          type: string
        dateOfBirth:
          type: string
          description: Date of birth (YYYY-MM-DD).
        address:
          type: string
          description: Full residential address.
        passportObjectPath:
          type: string
          description: Object storage path for the uploaded passport photo/document.
        ninSlipObjectPath:
          type: string
          description: Object storage path for the uploaded NIN slip document.

    NearbyRider:
      type: object
      required: [id, currentLatitude, currentLongitude, distanceKm]
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
        currentLatitude:
          type: number
        currentLongitude:
          type: number
        lastLocationAt:
          type: ["string", "null"]
        distanceKm:
          type: number

    RiderDirectoryEntry:
      type: object
      required: [id, totalDeliveries, createdAt]
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
        currentLatitude:
          type: ["number", "null"]
        currentLongitude:
          type: ["number", "null"]
        lastLocationAt:
          type: ["string", "null"]
        distanceKm:
          type: ["number", "null"]
        totalDeliveries:
          type: integer
        createdAt:
          type: string

    RiderOrderQueue:
      type: object
      required: [active, available, completedCount]
      properties:
        active:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryOrder"
        available:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryOrder"
        completedCount:
          type: integer

    # Deliveries
    DeliveryOrder:
      type: object
      required: [id, businessId, customerName, customerPhone, deliveryAddress, status, createdAt]
      properties:
        id:
          type: integer
        businessId:
          type: integer
        customerUserId:
          type: ["integer", "null"]
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        deliveryLatitude:
          type: ["number", "null"]
        deliveryLongitude:
          type: ["number", "null"]
        notes:
          type: ["string", "null"]
        status:
          type: string
          enum: [requested, accepted, picked_up, delivered, cancelled]
        riderId:
          type: ["integer", "null"]
        itemsSubtotal:
          type: ["number", "null"]
        deliveryFee:
          type: ["number", "null"]
        totalAmount:
          type: ["number", "null"]
        requestedAt:
          type: string
        acceptedAt:
          type: ["string", "null"]
        pickedUpAt:
          type: ["string", "null"]
        deliveredAt:
          type: ["string", "null"]
        cancelledAt:
          type: ["string", "null"]
        createdAt:
          type: string
        business:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            name:
              type: string
            slug:
              type: ["string", "null"]
            address:
              type: ["string", "null"]
            latitude:
              type: ["number", "null"]
            longitude:
              type: ["number", "null"]
            phone:
              type: ["string", "null"]
        rider:
          type: ["object", "null"]
          properties:
            id:
              type: integer
            fullName:
              type: ["string", "null"]
            phone:
              type: ["string", "null"]
            vehicleType:
              type: ["string", "null"]
            currentLatitude:
              type: ["number", "null"]
            currentLongitude:
              type: ["number", "null"]
            lastLocationAt:
              type: ["string", "null"]
        items:
          type: array
          items:
            $ref: "#/components/schemas/DeliveryOrderItem"
        trackingToken:
          description: Guest tracking token, only present once in the response right after creating an order without being logged in.
          type: string

    DeliveryOrderItem:
      type: object
      required: [id, itemName, unitPrice, quantity]
      properties:
        id:
          type: integer
        itemId:
          type: ["integer", "null"]
        itemName:
          type: string
        unitPrice:
          type: number
        quantity:
          type: integer

    DeliveryStatusInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [picked_up, delivered, cancelled]

    DeliveryOrderInput:
      type: object
      required: [customerName, customerPhone, deliveryAddress]
      properties:
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        deliveryLatitude:
          type: number
        deliveryLongitude:
          type: number
        notes:
          type: string

    # Marketplace
    MarketplaceItem:
      type: object
      required: [id, businessId, name, price, isAvailable, createdAt]
      properties:
        id:
          type: integer
        businessId:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        price:
          type: number
        imageUrl:
          type: ["string", "null"]
        isAvailable:
          type: boolean
        createdAt:
          type: string

    MarketplaceItemInput:
      type: object
      required: [name, price]
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string

    MarketplaceItemUpdateInput:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        imageUrl:
          type: string
        isAvailable:
          type: boolean

    AvailableRider:
      type: object
      required: [id, distanceKm, deliveryFee]
      properties:
        id:
          type: integer
        fullName:
          type: ["string", "null"]
        vehicleType:
          type: ["string", "null"]
        currentLatitude:
          type: ["number", "null"]
        currentLongitude:
          type: ["number", "null"]
        distanceKm:
          type: number
        deliveryFee:
          type: number

    MarketplaceOrderItemInput:
      type: object
      required: [itemId, quantity]
      properties:
        itemId:
          type: integer
        quantity:
          type: integer

    MarketplaceOrderInput:
      type: object
      required: [items, riderId, customerName, customerPhone, deliveryAddress]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/MarketplaceOrderItemInput"
        riderId:
          type: integer
        customerName:
          type: string
        customerPhone:
          type: string
        deliveryAddress:
          type: string
        deliveryLatitude:
          type: number
        deliveryLongitude:
          type: number
        notes:
          type: string

    # Admin
    ApprovalInput:
      type: object
      required: [approved]
      properties:
        approved:
          type: boolean
        reason:
          type: string

    # Storage
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
